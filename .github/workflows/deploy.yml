name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: |
          npm run lint -- --format json --output-file lint-results.json || true
          npm run lint

      - name: Run Build
        run: npm run build

      - name: Run Tests
        run: npm run test:coverage -- --reporter=default --reporter=json --outputFile=test-results.json

      - name: Generate Summary
        if: always()
        id: summary
        run: |
          SUMMARY="### 📊 Test & Lint Summary (Web)

          | Category | Status | Details |
          | :--- | :--- | :--- |"

          # Lint Summary
          LINT_STATUS="❓ Unknown"
          LINT_DETAILS="N/A"
          if [ -f lint-results.json ]; then
            ERROR_COUNT=$(jq '[.[].errorCount] | add // 0' lint-results.json)
            WARNING_COUNT=$(jq '[.[].warningCount] | add // 0' lint-results.json)
            if [ "$ERROR_COUNT" -eq "0" ] && [ "$WARNING_COUNT" -eq "0" ]; then
              LINT_STATUS="✅ Clean"
              LINT_DETAILS="No issues found"
            else
              LINT_STATUS="⚠️ Issues"
              [ "$ERROR_COUNT" -gt "0" ] && LINT_STATUS="❌ Errors"
              LINT_DETAILS="$ERROR_COUNT errors, $WARNING_COUNT warnings"
            fi
          fi
          SUMMARY="$SUMMARY
          | 🔍 Linting | $LINT_STATUS | $LINT_DETAILS |"

          # Test Summary
          TEST_STATUS="❓ Unknown"
          TEST_DETAILS="N/A"
          if [ -f test-results.json ]; then
            TOTAL_TESTS=$(jq '.numTotalTests // 0' test-results.json)
            PASSED_TESTS=$(jq '.numPassedTests // 0' test-results.json)
            FAILED_TESTS=$(jq '.numFailedTests // 0' test-results.json)
            if [ "$TOTAL_TESTS" -gt "0" ] || [ "$FAILED_TESTS" -gt "0" ]; then
              if [ "$FAILED_TESTS" -eq "0" ]; then
                TEST_STATUS="✅ Passed"
              else
                TEST_STATUS="❌ Failed"
              fi
              TEST_DETAILS="$PASSED_TESTS/$TOTAL_TESTS passed"
              [ "$FAILED_TESTS" -gt "0" ] && TEST_DETAILS="$TEST_DETAILS ($FAILED_TESTS failed)"
            fi
          fi
          SUMMARY="$SUMMARY
          | 🧪 Tests | $TEST_STATUS | $TEST_DETAILS |"

          # Coverage Summary
          COVERAGE_STATUS="❓ Unknown"
          COVERAGE_DETAILS="N/A"
          if [ -f coverage/coverage-summary.json ]; then
            PCT=$(jq '.total.lines.pct' coverage/coverage-summary.json)
            COVERAGE_DETAILS="Lines: $PCT%"
            if [ "$(echo "$PCT > 80" | awk '{print ($1 > 80)}')" -eq "1" ]; then
              COVERAGE_STATUS="✅ Good"
            elif [ "$(echo "$PCT > 50" | awk '{print ($1 > 50)}')" -eq "1" ]; then
              COVERAGE_STATUS="⚠️ Fair"
            else
              COVERAGE_STATUS="❌ Poor"
            fi
          fi
          SUMMARY="$SUMMARY
          | 📈 Coverage | $COVERAGE_STATUS | $COVERAGE_DETAILS |"

          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY

          # Export for PR comment
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post PR Comment
        if: always() && github.event_name == 'pull_request'
        uses: mshick/add-pr-comment@v2
        with:
          message: ${{ steps.summary.outputs.content }}
          message-id: web-test-lint-summary
          allow-repeats: false

  build-and-push:
    name: Build Image
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Update Cluster
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Kubernetes
        id: deploy
        env:
          IMAGE_TAG: ghcr.io/${{ github.repository }}:latest
          KUBECONFIG: ~/.kube/config
        continue-on-error: true
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          kubectl rollout restart deployment/frontend -n peladaapp
          kubectl rollout status deployment/frontend -n peladaapp --timeout=90s

      - name: Generate Deployment Summary
        if: always()
        run: |
          echo "### 🚀 Deployment Summary (Web)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Status | Namespace |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.deploy.outcome }}" == "success" ]; then
            echo "| 🚢 deployment/frontend | ✅ Rolled out | peladaapp |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🚢 deployment/frontend | ❌ Failed/Timeout | peladaapp |" >> $GITHUB_STEP_SUMMARY
          fi
